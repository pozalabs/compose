default_language_version.python = "3.13"

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.1"
hooks = [
  { id = "ruff", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.10.2"
hooks = [{ id = "uv-lock" }]

[[repos]]
repo = "local"
hooks = [
  {
    id = "fix-compose-imports",
    name = "Fix compose imports",
    entry = "python tools/fix_imports.py",
    language = "system",
    types = ["python"],
  },
]
