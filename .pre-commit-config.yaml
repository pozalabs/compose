default_language_version:
  python: python3.13
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.2
    hooks:
      - id: uv-lock
  - repo: local
    hooks:
      - id: fix-compose-imports
        name: Fix compose imports
        entry: python tools/fix_imports.py
        language: system
        types: [python]
