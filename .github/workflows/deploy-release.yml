name: Deploy Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  create-release:
    if: github.event.pull_request.merged && contains(github.event.pull_request.labels.*.name, 'Deploy')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from PR title
        id: version
        run: |
          VERSION=$(echo "${{ github.event.pull_request.title }}" | grep -oE 'v[0-9.]+')
          if [ -z "$VERSION" ]; then
            echo "::error::버전을 PR 제목에서 찾을 수 없습니다: ${{ github.event.pull_request.title }}"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Get draft release notes
        id: draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # release-drafter가 생성한 draft release 찾기
          DRAFT_TAG=$(gh release list --json tagName,isDraft -q '.[] | select(.isDraft) | .tagName' | head -1)

          if [ -n "$DRAFT_TAG" ]; then
            echo "draft_tag=$DRAFT_TAG" >> $GITHUB_OUTPUT
            # draft의 body 가져오기
            DRAFT_BODY=$(gh release view "$DRAFT_TAG" --json body -q '.body')
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$DRAFT_BODY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_draft=true" >> $GITHUB_OUTPUT
          else
            echo "has_draft=false" >> $GITHUB_OUTPUT
            echo "body=- ${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "${{ steps.draft.outputs.body }}" \
            --target main

      - name: Delete draft release
        if: steps.draft.outputs.has_draft == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.draft.outputs.draft_tag }}" --yes
