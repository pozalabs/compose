name: Run unit tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
      fail-fast: false

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Load python cache
        uses: ./.github/actions/load-python-cache
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: |
          poetry run pytest -vv -s tests
        env:
          APP_ENV: test
