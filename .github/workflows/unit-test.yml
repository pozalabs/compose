name: Run unit tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
        pydantic-version:
          - "^1.10.15"
          - "^2.7"
      fail-fast: false

    name: Python ${{ matrix.python-version }} / pydantic ${{ matrix.pydantic-version }}

    steps:
      - uses: actions/checkout@v4

      - uses: POZAlabs/actions/.github/actions/setup-python@v1-beta
        with:
          python-version: ${{ matrix.python-version }}
          setup-command: |
            poetry install --all-extras --no-interaction

      - name: Install pydantic ${{ matrix.pydantic-version }}
        run: poetry add pydantic@${{ matrix.pydantic-version }}

      - name: Run tests
        run: |
          poetry run pytest -vv -s tests -m unit
