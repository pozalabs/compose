name: Run unit tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
      fail-fast: false

    steps:
      - uses: actions/checkout@v3

      - uses: POZAlabs/actions/.github/actions/setup-python@v1
        with:
          python-version: ${{ matrix.python-version }}

#      - name: Run unit tests
#        run: |
#          poetry run pytest -vv -s tests

      - name: Run unit tests (pydantic v1)
        run: |
#          poetry add pydantic<2
          poetry run pytest -vv -s tests
