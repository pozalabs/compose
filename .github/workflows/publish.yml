name: Publish package
on:
  push:
    tags:
      - 'v*'
    workflow_dispatch:

jobs:
  publish-package:
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/pozalabs-compose/
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.26"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Build project
        run: uv build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
