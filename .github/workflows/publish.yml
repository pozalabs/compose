name: Publish package
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/pozalabs-compose/
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.11"
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Build project
        run: uv build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
