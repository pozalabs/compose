name: Release package
on:
  push:
    tags:
      - 'v*'

jobs:
  publish-release:
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/pozalabs-compose/
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: 3.12
          cache: pip

      - name: Install poetry
        if: steps.setup-python.outputs.cache-hit != 'true'
        run: pip install poetry==2.0.1

      - name: Build project
        run: poetry build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
