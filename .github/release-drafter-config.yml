name-template: "v$NEXT_MINOR_VERSION"
tag-template: "v$NEXT_MINOR_VERSION"
categories:
  - title: "✨ Features"
    label: "enhancement"
  - title: "🐛 Fixes"
    label: "bug"
  - title: "📝 Documentation"
    label: "documentation"
exclude-labels:
  - "Deploy"
change-template: "- $TITLE #$NUMBER @$AUTHOR"
template: |
  $CHANGES
